# Alertmanager secret overlay – Milvus alerts → Slack.
# Apply separately with: set -a && source .env && set +a && envsubst < this-file | kubectl apply -f -
# Requires .env with SLACK_WEBHOOK_ML_ALERTS and SLACK_WEBHOOK_ALERTS (see .env_template)
apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/component: alert-router
    app.kubernetes.io/instance: main
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: kube-prometheus
    app.kubernetes.io/version: 0.28.1
  name: alertmanager-main
  namespace: monitoring
stringData:
  alertmanager.yaml: |-
    "global":
      "resolve_timeout": "5m"
    "inhibit_rules":
    - "equal":
      - "namespace"
      - "alertname"
      "source_matchers":
      - "severity = critical"
      "target_matchers":
      - "severity =~ warning|info"
    - "equal":
      - "namespace"
      - "alertname"
      "source_matchers":
      - "severity = warning"
      "target_matchers":
      - "severity = info"
    - "equal":
      - "namespace"
      "source_matchers":
      - "alertname = InfoInhibitor"
      "target_matchers":
      - "severity = info"
    "receivers":
    - "name": "Default"
    - "name": "Watchdog"
    - "name": "Critical"
    - "name": "null"
    - "name": "Slack-Milvus-Warnings"
      "slack_configs":
      - "api_url": "$SLACK_WEBHOOK_ML_ALERTS"
        "send_resolved": true
        "title": '{{ range .Alerts }}{{ .Labels.alertname }}{{ if .Annotations.summary }}: {{ .Annotations.summary }}{{ end }}{{ "\n" }}{{ end }}'
        "text": '{{ range .Alerts }}{{ .Annotations.description }}{{ "\n" }}{{ end }}'
        "title_link": "$GRAFANA_MILVUS_DASHBOARD_URL&var-namespace={{ .GroupLabels.namespace }}"
    - "name": "Slack-Milvus-Criticals"
      "slack_configs":
      - "api_url": "$SLACK_WEBHOOK_ALERTS"
        "send_resolved": true
        "title": '{{ range .Alerts }}{{ .Labels.alertname }}{{ if .Annotations.summary }}: {{ .Annotations.summary }}{{ end }}{{ "\n" }}{{ end }}'
        "text": '{{ range .Alerts }}{{ .Annotations.description }}{{ "\n" }}{{ end }}'
        "title_link": "$GRAFANA_MILVUS_DASHBOARD_URL&var-namespace={{ .GroupLabels.namespace }}"
    "route":
      "group_by":
      - "namespace"
      "group_interval": "5m"
      "group_wait": "30s"
      "receiver": "Default"
      "repeat_interval": "12h"
      "routes":
      - "matchers":
        - "alertgroup = milvus"
        - "severity = warning"
        "receiver": "Slack-Milvus-Warnings"
      - "matchers":
        - "alertgroup = milvus"
        - "severity = critical"
        "receiver": "Slack-Milvus-Criticals"
      - "matchers":
        - "alertname = Watchdog"
        "receiver": "Watchdog"
      - "matchers":
        - "alertname = InfoInhibitor"
        "receiver": "null"
      - "matchers":
        - "severity = critical"
        "receiver": "Critical"
type: Opaque
