apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: cache
    app.kubernetes.io/instance: thanos-query-frontend-memcached
    app.kubernetes.io/name: thanos-query-frontend-memcached
    app.kubernetes.io/version: "1.6"
  name: thanos-query-frontend-memcached
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: cache
      app.kubernetes.io/instance: thanos-query-frontend-memcached
      app.kubernetes.io/name: thanos-query-frontend-memcached
  template:
    metadata:
      labels:
        app.kubernetes.io/component: cache
        app.kubernetes.io/instance: thanos-query-frontend-memcached
        app.kubernetes.io/name: thanos-query-frontend-memcached
        app.kubernetes.io/version: "1.6"
    spec:
      containers:
        - name: memcached
          image: memcached:1.6-alpine
          imagePullPolicy: IfNotPresent
          args:
            - -m
            - "1024"
            - -I
            - 5m
            - -c
            - "4096"
          ports:
            - containerPort: 11211
              name: memcached
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 11211
            runAsGroup: 11211
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "100m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "2Gi"
          livenessProbe:
            tcpSocket:
              port: memcached
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: memcached
            initialDelaySeconds: 5
            periodSeconds: 10
