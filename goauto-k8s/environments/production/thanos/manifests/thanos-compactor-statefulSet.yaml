apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: compactor
    app.kubernetes.io/instance: thanos-compactor
    app.kubernetes.io/name: thanos-compactor
    app.kubernetes.io/version: v0.41.0
  name: thanos-compactor
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: compactor
      app.kubernetes.io/instance: thanos-compactor
      app.kubernetes.io/name: thanos-compactor
  serviceName: thanos-compactor
  template:
    metadata:
      labels:
        app.kubernetes.io/component: compactor
        app.kubernetes.io/instance: thanos-compactor
        app.kubernetes.io/name: thanos-compactor
        app.kubernetes.io/version: v0.41.0
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - thanos-compactor
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - thanos-compactor
                namespaces:
                  - monitoring
                topologyKey: kubernetes.io/hostname
              weight: 100
      containers:
        - args:
            - compact
            - --wait
            # Temporary diagnostics mode: set to debug while investigating stuck compaction/downsampling.
            - --log.level=info
            - --log.format=logfmt
            - --data-dir=/var/thanos/compactor
            - --objstore.config=$(OBJSTORE_CONFIG)
            - --http-address=0.0.0.0:10902
            - --debug.accept-malformed-index
            # Retention configuration for 30-day data horizon
            # Keep raw (high-resolution) data for the last 14 days
            - --retention.resolution-raw=14d
            # Keep 5-minute downsampled data for 30 days
            - --retention.resolution-5m=30d
            # Keep 1-hour downsampled data for 90 days
            - --retention.resolution-1h=90d
            - --delete-delay=1h
            - --consistency-delay=30m
            - --deduplication.replica-label=prometheus_replica
            - --deduplication.replica-label=rule_replica
            - --compact.concurrency=1
            - --compact.blocks-fetch-concurrency=2
            - --block-files-concurrency=2
            - --downsample.concurrency=2
            - --compact.cleanup-interval=1m
            - --compact.progress-interval=2m
            - --web.disable-cors
            - --wait-interval=30s
          env:
            - name: OBJSTORE_CONFIG
              valueFrom:
                secretKeyRef:
                  key: thanos.yaml
                  name: thanos-objstore-config
            - name: HOST_IP_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          image: quay.io/thanos/thanos:v0.41.0
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 6
            httpGet:
              path: /-/healthy
              port: 10902
              scheme: HTTP
            periodSeconds: 30
            timeoutSeconds: 10
            initialDelaySeconds: 30
          name: thanos-compactor
          ports:
            - containerPort: 10902
              name: http
          readinessProbe:
            failureThreshold: 20
            httpGet:
              path: /-/ready
              port: 10902
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 10
            initialDelaySeconds: 30
          resources:
            requests:
              memory: "2Gi"      # Extra headroom for parallel compaction fetches
              cpu: "500m"       # Keep CPU request for sustained compaction throughput
            limits:
              memory: "6Gi"     # Extra headroom to avoid OOM during downsampling
              cpu: "2000m"       # Keep burst capacity for compaction/downsampling work
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - mountPath: /var/thanos/compactor
              name: data
              readOnly: false
      nodeSelector:
        kubernetes.io/os: linux
      securityContext:
        fsGroup: 65534
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: thanos-compactor
      terminationGracePeriodSeconds: 120
      volumes: []
  volumeClaimTemplates:
    - metadata:
        labels:
          app.kubernetes.io/component: compactor
          app.kubernetes.io/instance: thanos-compactor
          app.kubernetes.io/name: thanos-compactor
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 300Gi