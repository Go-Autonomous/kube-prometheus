apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: object-store-gateway
    app.kubernetes.io/instance: thanos-store
    app.kubernetes.io/name: thanos-store
    app.kubernetes.io/version: v0.39.1
  name: thanos-store
  namespace: monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: object-store-gateway
      app.kubernetes.io/instance: thanos-store
      app.kubernetes.io/name: thanos-store
  serviceName: thanos-store
  template:
    metadata:
      labels:
        app.kubernetes.io/component: object-store-gateway
        app.kubernetes.io/instance: thanos-store
        app.kubernetes.io/name: thanos-store
        app.kubernetes.io/version: v0.39.1
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - thanos-store
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - thanos-store
                namespaces:
                  - monitoring
                topologyKey: kubernetes.io/hostname
              weight: 100
      containers:
        - args:
            - store
            - --log.level=info
            - --log.format=logfmt
            - --data-dir=/var/thanos/store
            - --grpc-address=0.0.0.0:10901
            - --http-address=0.0.0.0:10902
            - --objstore.config=$(OBJSTORE_CONFIG)
            - --ignore-deletion-marks-delay=48h
            - --sync-block-duration=5m
            - --block-sync-concurrency=20
            - --consistency-delay=30m
            - --index-cache-size=2GB
            - --chunk-pool-size=4GB
            - --store.grpc.series-sample-limit=0
            - --store.grpc.series-max-concurrency=80
            - --grpc-grace-period=2m
            - --store.grpc.touched-series-limit=0
            - --block-meta-fetch-concurrency=16
          env:
            - name: OBJSTORE_CONFIG
              valueFrom:
                secretKeyRef:
                  key: thanos.yaml
                  name: thanos-objstore-config
            - name: GOMEMLIMIT
              value: 18GiB
            - name: HOST_IP_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          image: quay.io/thanos/thanos:v0.39.1
          imagePullPolicy: IfNotPresent
          startupProbe:
            failureThreshold: 90
            httpGet:
              path: /-/ready
              port: 10902
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            failureThreshold: 6
            httpGet:
              path: /-/healthy
              port: 10902
              scheme: HTTP
            periodSeconds: 30
            timeoutSeconds: 10
            initialDelaySeconds: 30
          name: thanos-store
          ports:
            - containerPort: 10901
              name: grpc
            - containerPort: 10902
              name: http
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /-/ready
              port: 10902
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 10
            initialDelaySeconds: 30
          resources:
            requests:
              memory: "12Gi"
              cpu: "500m"
            limits:
              memory: "20Gi"
              cpu: "2000m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - mountPath: /var/thanos/store
              name: data
              readOnly: false
      nodeSelector:
        kubernetes.io/os: linux
      securityContext:
        fsGroup: 65534
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: thanos-store
      terminationGracePeriodSeconds: 120
      volumes: []
  volumeClaimTemplates:
    - metadata:
        labels:
          app.kubernetes.io/component: object-store-gateway
          app.kubernetes.io/instance: thanos-store
          app.kubernetes.io/name: thanos-store
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
