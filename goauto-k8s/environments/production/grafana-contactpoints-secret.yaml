# Grafana contact points – #ml-alerts and #alerts (distinct names, no overlap with existing).
# Apply with: set -a && source .env && set +a && envsubst < this-file | kubectl apply -f -
# Requires .env with SLACK_WEBHOOK_ML_ALERTS and SLACK_WEBHOOK_ALERTS (see .env_template)
apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/component: grafana
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: kube-prometheus
  name: grafana-alerting-contactpoints
  namespace: monitoring
stringData:
  contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: Slack-ml-alerts
        receivers:
          - uid: slack-ml-alerts
            type: slack
            disableResolveMessage: false
            settings:
              url: $SLACK_WEBHOOK_ML_ALERTS
      - orgId: 1
        name: Slack-alerts
        receivers:
          - uid: slack-alerts
            type: slack
            disableResolveMessage: false
            settings:
              url: $SLACK_WEBHOOK_ALERTS
type: Opaque
